name: "aws-auroradb-destroy"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm destruction of all resources'
        required: true
      target:
        description: "Optional: specific resource to target (e.g. aws_rds_cluster.aurora)"
        required: false

env:
  AWS_REGION: us-east-2

jobs:
  tf-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          if [ -n "${{ github.event.inputs.target }}" ]; then
            terraform destroy -auto-approve -target=${{ github.event.inputs.target }}
          else
            terraform destroy -auto-approve
          fi

      - name: Destroy Summary
        run: echo "### Destroy complete" >> $GITHUB_STEP_SUMMARY
